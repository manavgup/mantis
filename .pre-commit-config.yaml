# -----------------------------------------------------------------------------
# Pre-commit Configuration
# -----------------------------------------------------------------------------
# Enforces code quality, formatting, and security standards before commits.
#
# Installation:
#   uv run pre-commit install
#   uv run pre-commit run --all-files
#
# Update hooks:
#   uv run pre-commit autoupdate
# -----------------------------------------------------------------------------

repos:
  # ---------------------------------------------------------------------------
  # Formatting Hooks (MODIFIES FILES)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        description: Removes trailing whitespace from all files.
        types: [text]

      - id: end-of-file-fixer
        name: Fix end of files
        description: Ensures files end with exactly one newline.
        types: [text]

      - id: fix-byte-order-marker
        name: Fix UTF-8 byte order marker
        description: Removes UTF-8 BOM which can cause issues with some tools.
        types: [text]

      - id: mixed-line-ending
        name: Fix mixed line endings
        description: Normalizes line endings to LF.
        types: [text]
        args: [--fix=lf]

  # ---------------------------------------------------------------------------
  # Validation Hooks (LINTING ONLY — does not modify files)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: Validate YAML syntax
        description: Checks YAML files for parseable syntax.
        types: [yaml]

      - id: check-toml
        name: Validate TOML syntax
        description: Checks TOML files for parseable syntax.
        types: [toml]

      - id: check-json
        name: Validate JSON syntax
        description: Checks JSON files for parseable syntax.
        types: [json]
        exclude: tests/fixtures/

      - id: check-ast
        name: Validate Python AST
        description: Checks that Python files parse as valid syntax.
        types: [python]

      - id: check-added-large-files
        name: Check for large files
        description: Prevents committing files larger than 500KB.
        args: [--maxkb=500]

      - id: check-merge-conflict
        name: Check for merge conflicts
        description: Detects unresolved merge conflict markers.
        types: [text]

      - id: check-case-conflict
        name: Check case conflicts
        description: Checks for files that differ only in case (problematic on macOS/Windows).

      - id: debug-statements
        name: Check for debug statements
        description: Detects leftover debugger imports and breakpoint() calls.
        types: [python]

  # ---------------------------------------------------------------------------
  # Security Hooks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
        name: Detect private keys
        description: Prevents committing private key files.
        types: [text]

  # ---------------------------------------------------------------------------
  # Python Code Quality (MODIFIES FILES)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        name: Ruff lint (with autofix)
        description: Fast Python linter — checks for errors, style, and import ordering.
        args: [--fix]

      - id: ruff-format
        name: Ruff format
        description: Fast Python formatter — enforces consistent code style.

  # ---------------------------------------------------------------------------
  # AI Artifact Detection
  # ---------------------------------------------------------------------------
  #   Blocks common LLM artifacts before they enter the repo:
  #   - :contentReference patterns
  #   - [oaicite:??<digits>] citation markers
  #   - source=chatgpt.com metadata
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: forbid-ai-artifacts
        name: Forbid AI artifacts
        description: Prevents LLM-generated citation markers and metadata from being committed.
        entry: '(:contentReference|\[oaicite:\?\?\d+\]|source=chatgpt\.com)'
        language: pygrep
        types: [text]
        exclude: ^\.pre-commit-config\.yaml$

      - id: forbid-ai-stock-phrases
        name: Forbid AI stock phrases
        description: Prevents common AI-generated boilerplate phrases from being committed.
        entry: '(?i)(as an ai language model|i am an ai developed by|this response was generated by|my knowledge cutoff|my training data)'
        language: pygrep
        types: [text]
        exclude: ^\.pre-commit-config\.yaml$
