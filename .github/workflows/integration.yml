# ===============================================================
# Integration Tests — Full Stack Gate
# ===============================================================
#
#   Spins up Redis + Postgres service containers and runs
#   the full test suite including integration tests.
#
#   Triggers on PRs to main when harness, tests, or
#   docker-compose config changes. Skips draft PRs.
# ---------------------------------------------------------------

name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]
    paths:
      - "harness/**"
      - "tests/**"
      - "docker-compose.yml"
      - ".github/workflows/integration.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    if: "!github.event.pull_request.draft"
    name: Integration tests (Redis + Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://localhost:6379
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/mantis_test

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mantis_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Install dependencies
        run: uv sync

      - name: Run all tests (unit + integration)
        run: make test-all
