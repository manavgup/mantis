# ===============================================================
# Lint & Static Analysis — Code Quality Gate
# ===============================================================
#
#   Runs ruff linter and formatter checks on all Python source.
#   Triggers on PRs to main when Python or config files change.
#   Skips draft PRs.
# ---------------------------------------------------------------

name: Lint & Static Analysis

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]
    paths:
      - "harness/**"
      - "worker/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Pin linter version so CI and local runs are identical.
env:
  RUFF_VERSION: "0.11.0"

jobs:
  ruff:
    if: "!github.event.pull_request.draft"
    name: Ruff lint & format check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Install dependencies
        run: uv sync

      # ---------------------------------------------------------------
      # Ruff check — lint for errors, style, and import ordering
      # ---------------------------------------------------------------
      - name: Ruff check
        run: uv run ruff check harness/ worker/ tests/

      # ---------------------------------------------------------------
      # Ruff format — verify formatting matches ruff's style
      # ---------------------------------------------------------------
      - name: Ruff format check
        run: uv run ruff format --check harness/ worker/ tests/
