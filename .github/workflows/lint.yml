name: Lint

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]
    paths:
      - "harness/**"
      - "worker/**"
      - "tests/**"
      - "pyproject.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: Ruff check
        run: uv run ruff check harness/ worker/ tests/
      - name: Ruff format check
        run: uv run ruff format --check harness/ worker/ tests/
