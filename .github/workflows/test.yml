# ===============================================================
# Tests & Coverage — Quality Gate
# ===============================================================
#
#   Runs the unit test suite with coverage measurement.
#   Integration tests are excluded (they require Redis/Docker).
#   Fails if unit-testable code coverage drops below 50%.
#
#   Triggers on PRs to main when source or test files change.
#   Skips draft PRs.
# ---------------------------------------------------------------

name: Tests & Coverage

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]
    paths:
      - "harness/**"
      - "worker/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    if: "!github.event.pull_request.draft"
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Install dependencies
        run: uv sync

      # ---------------------------------------------------------------
      # Run unit tests with coverage (fail under 50%)
      #
      # Integration tests (tests/integration/) are excluded because
      # they require Redis, Postgres, and Docker which are not
      # available in the CI environment.
      #
      # Infrastructure modules (cli, dispatcher, models, queue) are
      # omitted from coverage as they can only be exercised via
      # integration tests. Unit-testable code coverage is ~84%.
      # ---------------------------------------------------------------
      - name: Run unit tests with coverage
        run: |
          uv run pytest \
            --ignore=tests/integration \
            --strict-markers \
            --cov=harness \
            --cov-report=term \
            --cov-fail-under=50
